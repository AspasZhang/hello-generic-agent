name: Build PDF & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true
        default: 'v1.0.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended \
            texlive-lang-chinese texlive-latex-extra fonts-noto-cjk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create LaTeX header
        run: |
          cat > header.tex << 'LATEX'
          \usepackage{longtable,booktabs,array}
          \usepackage{makecell}
          \renewcommand{\arraystretch}{1.3}
          \setlength{\tabcolsep}{3pt}
          \let\oldlongtable\longtable
          \renewcommand{\longtable}{\footnotesize\oldlongtable}
          \usepackage{graphicx}
          \makeatletter
          \def\maxwidth{\ifdim\Gin@nat@width>\linewidth\linewidth\else\Gin@nat@width\fi}
          \makeatother
          \setkeys{Gin}{width=\maxwidth,keepaspectratio}
          LATEX

      - name: Build PDF
        run: |
          pip install emoji

          # Create preprocessing script
          cat > preprocess.py << 'PYTHON'
          import emoji
          import sys
          import re

          def replace_emoji(text):
              """Replace emoji with their text description"""
              return emoji.replace_emoji(text, replace=lambda chars, data_dict: f'[{data_dict["en"]}]' if data_dict.get("en") else '')

          content = sys.stdin.read()
          # Also handle some common emoji that might not be in the library
          content = replace_emoji(content)
          sys.stdout.write(content)
          PYTHON

          # Combine all chapter markdown files in order
          CHAPTERS=(
            docs/part1/chapter1/index.md
            docs/part1/chapter2/index.md
            docs/part1/chapter3/index.md
            docs/part1/chapter4/index.md
            docs/part1/chapter5/index.md
            docs/part1/chapter6/index.md
            docs/part2/chapter7/index.md
            docs/part2/chapter8/index.md
            docs/part2/chapter9/index.md
            docs/part2/chapter10/index.md
            docs/part2/chapter11/index.md
            docs/part2/chapter12/index.md
            docs/part2/chapter13/index.md
            docs/part3/chapter14/index.md
          )

          # Create combined markdown with image path fixes
          > combined.md
          for f in "${CHAPTERS[@]}"; do
            dir=$(dirname "$f")
            echo "" >> combined.md
            # Fix relative image paths
            sed "s|images/|${dir}/images/|g" "$f" >> combined.md
            echo "" >> combined.md
            echo "\\newpage" >> combined.md
          done

          # Preprocess: replace emoji with text descriptions
          python preprocess.py < combined.md > combined_clean.md

          # Generate PDF with pandoc
          pandoc combined_clean.md \
            -o hello-generic-agent.pdf \
            --pdf-engine=xelatex \
            --include-in-header=header.tex \
            -V mainfont="Noto Sans CJK SC" \
            -V sansfont="Noto Sans CJK SC" \
            -V monofont="Noto Sans Mono CJK SC" \
            -V CJKmainfont="Noto Sans CJK SC" \
            -V geometry:margin=2cm \
            -V geometry:a4paper \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=blue \
            -V fontsize=11pt \
            --highlight-style=tango \
            --toc \
            --toc-depth=2 \
            -V toc-title="目录" \
            -V title="Hello Generic Agent 教程" \
            -V author="Datawhale" \
            -V date="$(date +%Y-%m-%d)" \
            --resource-path=.:docs:docs/part1:docs/part2:docs/part3 \
            --wrap=none

          echo "✅ PDF generated: $(ls -lh hello-generic-agent.pdf | awk '{print $5}')"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: "Hello Generic Agent ${{ github.event.inputs.version || github.ref_name }}"
          body: |
            ## 下载
            下载下方 `hello-generic-agent.pdf` 即可离线阅读。

            ### 内容包含
            - Part 1：应用篇（第1-6章）
            - Part 2：原理篇（第7-13章）
            - Part 3：实战篇（Case 1）

            ---
            在线阅读: https://datawhalechina.github.io/hello-generic-agent/
          files: hello-generic-agent.pdf
          draft: false
          prerelease: false