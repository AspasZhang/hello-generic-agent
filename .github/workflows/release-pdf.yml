name: Build PDF & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true
        default: 'v1.0.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-lang-chinese fonts-noto-cjk

      - name: Build PDF
        run: |
          # Combine all chapter markdown files in order
          CHAPTERS=(
            docs/part1/chapter1/index.md
            docs/part1/chapter2/index.md
            docs/part1/chapter3/index.md
            docs/part1/chapter4/index.md
            docs/part1/chapter5/index.md
            docs/part1/chapter6/index.md
            docs/part2/chapter7/index.md
            docs/part2/chapter8/index.md
            docs/part2/chapter9/index.md
            docs/part2/chapter10/index.md
            docs/part2/chapter11/index.md
            docs/part2/chapter12/index.md
            docs/part2/chapter13/index.md
            docs/part3/chapter14/index.md
          )

          # Create combined markdown with image path fixes
          > combined.md
          for f in "${CHAPTERS[@]}"; do
            dir=$(dirname "$f")
            echo "" >> combined.md
            # Fix relative image paths
            sed "s|images/|${dir}/images/|g" "$f" >> combined.md
            echo "" >> combined.md
            echo "\\newpage" >> combined.md
          done

          # Generate PDF with pandoc
          pandoc combined.md \
            -o hello-generic-agent.pdf \
            --pdf-engine=xelatex \
            -V mainfont="Noto Sans CJK SC" \
            -V monofont="Noto Sans Mono CJK SC" \
            -V geometry:margin=2.5cm \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=blue \
            --highlight-style=tango \
            -V CJKmainfont="Noto Sans CJK SC" \
            --toc \
            -V toc-title="目录" \
            -V title="Hello Generic Agent 教程" \
            -V author="Datawhale" \
            -V date="$(date +%Y-%m-%d)" \
            --resource-path=docs

          echo "✅ PDF generated: $(ls -lh hello-generic-agent.pdf | awk '{print $5}')"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: "📖 Hello Generic Agent ${{ github.event.inputs.version || github.ref_name }}"
          body: |
            ## 📥 下载
            下载下方 `hello-generic-agent.pdf` 即可离线阅读。

            ### 📚 内容包含
            - Part 1：应用篇（第1-6章）
            - Part 2：原理篇（第7-13章）
            - Part 3：实战篇（Case 1）

            ---
            🌐 [在线阅读](https://datawhalechina.github.io/hello-generic-agent/)
          files: hello-generic-agent.pdf
          draft: false
          prerelease: false